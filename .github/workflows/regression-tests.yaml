name: Regression Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  regression-tests:
    name: Event Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Build playground app image
        run: docker build -t playground-app -f app/Dockerfile .

      - name: Start DD Agent container
        run: |
          docker run -d \
            --name dd-agent \
            --cgroupns=host \
            --pid=host \
            --net=host \
            --security-opt=apparmor:unconfined \
            --cap-add=SYS_ADMIN \
            --cap-add=SYS_RESOURCE \
            --cap-add=SYS_PTRACE \
            --cap-add=NET_ADMIN \
            --cap-add=NET_BROADCAST \
            --cap-add=NET_RAW \
            --cap-add=IPC_LOCK \
            --cap-add=CHOWN \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            -v /proc/:/host/proc/:ro \
            -v /sys/fs/cgroup/:/host/sys/fs/cgroup:ro \
            -v /etc/passwd:/etc/passwd:ro \
            -v /etc/group:/etc/group:ro \
            -v /:/host/root:ro \
            -v /etc/os-release:/host/etc/os-release:ro \
            -v /sys/kernel/debug:/sys/kernel/debug \
            -e DD_RUNTIME_SECURITY_CONFIG_ENABLED=true \
            -e DD_RUNTIME_SECURITY_CONFIG_EVENT_GRPC_SERVER=security-agent \
            -e DD_RUNTIME_SECURITY_CONFIG_SOCKET=localhost:10000 \
            datadog/agent:latest

      - name: Start playground app container
        run: |
          docker run -d \
            --name playground-app \
            --net=host \
            playground-app

      - name: Wait for playground readiness
        run: |
          echo "Waiting for playground app..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ping > /dev/null 2>&1; then
              echo "Playground app is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Playground app did not become ready"
          exit 1

      - name: Run regression tests
        working-directory: tests
        run: pytest test_rce_malware.py -v -s

      - name: Collect agent logs
        if: failure()
        run: |
          echo "=== DD Agent logs ==="
          docker logs dd-agent 2>&1 | tail -200
          echo ""
          echo "=== Playground app logs ==="
          docker logs playground-app 2>&1 | tail -100

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f dd-agent playground-app 2>/dev/null || true
