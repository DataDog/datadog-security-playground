global
    log stdout format raw daemon

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend main
    bind *:8080
    default_backend app_backend

backend app_backend
    mode http
    option httpchk GET /health
    server app1 appsec-test-api:8000 check init-addr none
