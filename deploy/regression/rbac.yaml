apiVersion: v1
kind: ServiceAccount
metadata:
  name: scenario-runner
  namespace: playground
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scenario-runner
  namespace: playground
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scenario-runner
  namespace: playground
subjects:
  - kind: ServiceAccount
    name: scenario-runner
    namespace: playground
roleRef:
  kind: Role
  name: scenario-runner
  apiGroup: rbac.authorization.k8s.io
